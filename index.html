<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperos Baiano - Pedido Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primaria: #e67e22; --secundaria: #27ae60; --fundo: #f8f9fa; }
        body { font-family: 'Montserrat', sans-serif; background: var(--fundo); padding: 15px; color: #333; }
        .container { max-width: 450px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin: auto; }
        h2 { color: var(--primaria); text-align: center; margin-bottom: 5px; text-transform: uppercase; }
        .info-entrega { font-size: 0.85em; color: #7f8c8d; text-align: center; margin-bottom: 20px; line-height: 1.5; }
        h3 { color: #2c3e50; border-left: 5px solid var(--primaria); padding-left: 10px; margin-top: 25px; font-size: 1.1em; }
        
        .item-container { background: #fffdf9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #f9ebe0; }
        .item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .item-row label { font-weight: bold; flex-grow: 1; font-size: 0.95em; }
        .item-row .price { color: var(--primaria); font-weight: bold; margin-right: 10px; }
        
        input[type="number"] { width: 50px; padding: 8px; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        input[type="text"] { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .pix-section { background: #ebf5fb; padding: 15px; border-radius: 12px; border: 1px solid #d4e6f1; margin-top: 20px; text-align: center; }
        .pix-key { background: white; padding: 10px; border-radius: 5px; border: 1px dashed #3498db; font-size: 0.8em; word-break: break-all; margin: 10px 0; }
        .btn-copy { background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.8em; }

        .total-box { text-align: center; margin-top: 25px; font-size: 1.5em; font-weight: bold; color: var(--secundaria); }
        
        button.btn-finalizar { width: 100%; background: var(--secundaria); color: white; border: none; padding: 20px; font-weight: bold; cursor: pointer; border-radius: 12px; font-size: 1.1em; margin-top: 20px; box-shadow: 0 4px 0 #1e8449; transition: 0.2s; }
        button.btn-finalizar:active { transform: translateY(2px); box-shadow: 0 2px 0 #1e8449; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Temperos Baiano</h2>
        <p class="info-entrega">📍 Ramos, Olaria e Bonsucesso<br>⏰ Pedidos das 11h às 14h</p>
        
        <h3>Escolha sua Marmita</h3>
        
        <div class="item-container">
            <div class="item-row">
                <label>Tam. P (1 Prot.)</label>
                <span class="price">R$20,00</span>
                <input type="number" id="q-20" value="0" min="0" onchange="calc()">
            </div>
            <input type="text" id="p-20" placeholder="Qual a proteína?">
        </div>

        <div class="item-container">
            <div class="item-row">
                <label>Tam. M (2 Prots.)</label>
                <span class="price">R$22,00</span>
                <input type="number" id="q-22" value="0" min="0" onchange="calc()">
            </div>
            <input type="text" id="p-22" placeholder="Quais as proteínas?">
        </div>

        <div class="item-container">
            <div class="item-row">
                <label>Carne Especial</label>
                <span class="price">R$24,00</span>
                <input type="number" id="q-24" value="0" min="0" onchange="calc()">
            </div>
            <input type="text" id="p-24" placeholder="Qual a carne de hoje?">
        </div>

        <h3>Dados e Pagamento</h3>
        <input type="text" id="nome" placeholder="Seu Nome">
        <input type="text" id="end" placeholder="Endereço Completo">
        
        <select id="metodo-pgto" onchange="togglePix()" style="width:100%; padding:12px; margin-top:10px; border-radius:8px; border:1px solid #ddd;">
            <option value="Dinheiro">Pagar na Entrega (Dinheiro)</option>
            <option value="Cartão">Pagar na Entrega (Cartão/Vale)</option>
            <option value="Pix">Pagar Agora via Pix</option>
        </select>

        <div id="pix-area" class="pix-section" style="display:none;">
            <p style="font-weight:bold; margin-bottom:5px;">Pagamento via Pix</p>
            <p style="font-size:0.8em;">Chave-Pix(e-mail):</p>
            <div class="pix-key" id="Chave-pix">restaurantetemperosbaiano@gmail.com</div>
            <button class="btn-copy" onclick="copyPix()">Copiar Chave Pix</button>
            <p style="font-size:0.7em; margin-top:10px; color:#e74c3c;">* Realize o pagamento e anexe o comprovante na conversa do WhatsApp.</p>
        </div>

        <div class="total-box">Total: <span id="total">R$ 0,00</span></div>

        <button class="btn-finalizar" onclick="enviar()">FINALIZAR E ENVIAR PEDIDO</button>
    </div>

    <script>
        function calc() {
            let total = (document.getElementById('q-20').value * 20) + 
                        (document.getElementById('q-22').value * 22) + 
                        (document.getElementById('q-24').value * 24);
            document.getElementById('total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        function togglePix() {
            const area = document.getElementById('pix-area');
            area.style.display = document.getElementById('metodo-pgto').value === 'Pix' ? 'block' : 'none';
        }

        function copyPix() {
            const chave = document.getElementById('chave-pix').innerText;
            navigator.clipboard.writeText(chave);
            alert("Chave Pix copiada!");
        }

        function enviar() {
            const fone = "5521967714571";
            const nome = document.getElementById('nome').value;
            const end = document.getElementById('end').value;
            const pgto = document.getElementById('metodo-pgto').value;
            
            if(!nome || !end) return alert("Por favor, preencha Nome e Endereço.");

            let itens = [];
            const check = (idQ, idP, label) => {
                const q = document.getElementById(idQ).value;
                const p = document.getElementById(idP).value;
                if(q > 0) itens.push(`- ${q}x ${label} (${p || 'Não informado'})`);
            };

            check('q-20', 'p-20', 'Marmita R$20');
            check('q-22', 'p-22', 'Marmita R$22');
            check('q-24', 'p-24', 'Marmita R$24');

            if(itens.length === 0) return alert("Adicione pelo menos uma marmita.");

            let msg = `*NOVO PEDIDO - TEMPEROS BAIANO*%0A%0A`;
            msg += `*Cliente:* ${nome}%0A*Endereço:* ${end}%0A*Pagamento:* ${pgto}%0A%0A`;
            msg += `*ITENS:*%0A${itens.join('%0A')}%0A%0A`;
            msg += `*TOTAL: ${document.getElementById('total').innerText}*`;
            if(pgto === 'Pix') msg += `%0A%0A_Aguardando envio do comprovante pelo cliente._`;

            window.open(`https://wa.me/${fone}?text=${msg}`);
        }
    </script>
</body>
</html>
