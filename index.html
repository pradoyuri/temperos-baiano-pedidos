<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperos Baiano - Cardápio Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primaria: #e67e22;
            --secundaria: #27ae60;
            --fundo: #f8f9fa;
            --texto: #2d3436;
            --branco: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--fundo); color: var(--texto); padding-bottom: 90px; }

        header { background: var(--branco); padding: 20px; text-align: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 700; color: var(--primaria); font-size: 1.3rem; text-transform: uppercase; }
        .status-badge { font-size: 0.7rem; font-weight: bold; padding: 5px 12px; border-radius: 20px; display: inline-block; margin-top: 5px; border: 1px solid #ddd; }
        .open { color: var(--secundaria); border-color: var(--secundaria); background: #f0fff4; }
        .closed { color: #e74c3c; border-color: #e74c3c; background: #fff5f5; }

        .container { max-width: 500px; margin: auto; }
        .titulo-secao { padding: 25px 15px 10px; font-weight: 700; color: #636e72; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        .card-produto { background: var(--branco); margin: 0 15px 10px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .card-produto:active { transform: scale(0.97); }
        .info-p h4 { font-size: 0.95rem; color: var(--texto); }
        .info-p p { font-size: 0.75rem; color: #b2bec3; }
        .preco-p { color: var(--secundaria); font-weight: 700; font-size: 0.95rem; margin-top: 5px; }
        .aviso-preco { font-size: 0.65rem; color: #e67e22; font-style: italic; }
        .btn-add { background: var(--primaria); color: white; width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--branco); z-index: 1000; overflow-y: auto; padding: 20px; }
        .header-modal { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .box-pergunta { background: #fff4eb; padding: 12px; border-radius: 10px; font-weight: 700; font-size: 0.8rem; margin: 15px 0 10px; color: var(--primaria); text-transform: uppercase; }
        
        /* LISTA DE PROTEÍNAS COM ROLAGEM */
        .lista-selecao { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            max-height: 250px; 
            overflow-y: auto; 
            padding: 10px 5px;
            border: 1px solid #eee;
            border-radius: 12px;
            background: #fdfdfd;
        }
        .lista-selecao::-webkit-scrollbar { width: 6px; }
        .lista-selecao::-webkit-scrollbar-thumb { background-color: #ddd; border-radius: 10px; }

        .item-selecao { 
            padding: 12px; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; 
            font-size: 0.85rem; transition: 0.2s; display: flex; justify-content: space-between; align-items: center;
        }
        .item-selecao.active { background: var(--primaria); color: white; border-color: var(--primaria); font-weight: 600; }
        .badge-extra { font-size: 0.65rem; background: rgba(0,0,0,0.1); padding: 2px 6px; border-radius: 4px; color: #e67e22; }
        .active .badge-extra { color: white; background: rgba(255,255,255,0.2); }

        .lista-vertical { display: flex; flex-direction: column; }
        .check-linha { display: flex; justify-content: space-between; padding: 15px 5px; border-bottom: 1px solid #f1f2f6; align-items: center; font-size: 0.95rem; cursor: pointer; width: 100%; }
        .check-linha input { width: 22px; height: 22px; accent-color: var(--primaria); }

        /* CARRINHO */
        .barra-carrinho { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: var(--branco); padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); display: none; z-index: 900; left: 50%; transform: translateX(-50%); }
        .btn-checkout { background: var(--secundaria); color: white; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 700; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }

        /* CHECKOUT */
        #tela-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--fundo); z-index: 1100; padding: 20px; overflow-y: auto; }
        .resumo-card { background: var(--branco); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #eee; }
        .item-resumo { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 12px; border-bottom: 1px solid #f1f2f6; margin-bottom: 12px; }
        .btn-remover { background: none; border: none; color: #e74c3c; font-size: 0.75rem; font-weight: 600; cursor: pointer; margin-top: 5px; }
        
        .campo { margin-bottom: 15px; }
        .campo label { display: block; font-size: 0.7rem; font-weight: 700; color: #95a5a6; margin-bottom: 5px; text-transform: uppercase; }
        .campo input, .campo select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 0.95rem; background: white; }
        .btn-final { width: 100%; background: var(--secundaria); color: white; padding: 18px; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">Temperos Baiano</div>
        <div id="status-loja" class="status-badge">Verificando...</div>
    </header>

    <div class="titulo-secao">Marmitas do Dia</div>
    
    <div class="card-produto" onclick="abrirCustomizacao('P', 20.00)">
        <div class="info-p">
            <h4>Marmita P</h4>
            <p>1 Proteína + Acompanhamentos</p>
            <div class="preco-p">R$ 20,00</div>
            <span class="aviso-preco">* Carne vermelha: R$ 23,00</span>
        </div>
        <div class="btn-add">+</div>
    </div>

    <div class="card-produto" onclick="abrirCustomizacao('M', 22.00)">
        <div class="info-p">
            <h4>Marmita M</h4>
            <p>2 Proteínas + Acompanhamentos</p>
            <div class="preco-p">R$ 22,00</div>
            <span class="aviso-preco">* Carne vermelha: R$ 25,00</span>
        </div>
        <div class="btn-add">+</div>
    </div>

    <div class="titulo-secao">Bebidas e Sucos</div>
    <div id="lista-bebidas"></div>
</div>

<div id="modal-montar" class="modal">
    <div class="header-modal">
        <h3 id="titulo-modal">Configurar Marmita</h3>
        <button onclick="fecharModais()" style="background:none; border:none; font-size:1.5rem; color:#ccc;">✕</button>
    </div>

    <div class="box-pergunta">Escolha a Proteína</div>
    <div id="lista-proteinas" class="lista-selecao"></div>

    <div class="box-pergunta">Acompanhamentos</div>
    <div id="check-acompanhamentos" class="lista-vertical"></div>
    
    <button id="btn-confirmar" onclick="confirmarItem()" style="width:100%; background:var(--primaria); color:white; padding:18px; border:none; border-radius:12px; margin-top:25px; font-weight:700; opacity:0.5;" disabled>Selecione a Proteína</button>
</div>

<div id="carrinho-fixo" class="barra-carrinho">
    <button class="btn-checkout" onclick="irParaCheckout()">
        <span id="txt-qtd">0 itens</span>
        <span>Ver Carrinho</span>
        <span id="txt-total">R$ 0,00</span>
    </button>
</div>

<div id="tela-final">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h3>Seu Pedido</h3>
        <button onclick="fecharModais()" style="background:none; border:none; color:var(--primaria); font-weight:700;">+ Adicionar Mais</button>
    </div>
    <div id="itens-final" class="resumo-card"></div>
    <div class="campo"><label>Seu Nome</label><input type="text" id="nome-cliente"></div>
    <div class="campo"><label>Endereço de Entrega</label><input type="text" id="end-cliente" placeholder="Rua, nº, bairro e referência"></div>
    <div class="campo"><label>Horário de Entrega</label><select id="horario-entrega"><option value="11:30">11:30</option><option value="12:00">12:00</option><option value="12:30">12:30</option><option value="13:00">13:00</option><option value="13:30">13:30</option><option value="14:00">14:00</option><option value="14:30">14:30</option></select></div>
    <div class="campo"><label>Pagamento</label><select id="pgto-cliente"><option value="Pix">Pix (Copia e Cola)</option><option value="Dinheiro">Dinheiro</option><option value="Cartão/Vale">Cartão / Vale</option></select></div>
    <button onclick="finalizarNoZap()" class="btn-final">ENVIAR PARA O WHATSAPP</button>
</div>

<script>
    let carrinho = [];
    let selecionado = null;
    let proteinaEscolhida = null;

    const listaProteinas = [
        {n: "Frango cozido com quiabo", extra: false},
        {n: "Moela com batata", extra: false},
        {n: "Escondidinho de carne moída", extra: true},
        {n: "Panqueca de carne moída", extra: true},
        {n: "Bife com batata frita", extra: true},
        {n: "Frango parmegiana com batata frita", extra: false},
        {n: "Empadão de frango", extra: false},
        {n: "Lasanha de carne moída", extra: true},
        {n: "Almôndega com purê de batata", extra: true},
        {n: "Fígado com purê de batata", extra: true},
        {n: "Pernil suino", extra: false},
        {n: "Carré suino com purê de batata", extra: false},
        {n: "Carré suino com couve mineira", extra: false},
        {n: "Filé de peixe com purê de batata", extra: false},
        {n: "Filé de frango grelhado", extra: false},
        {n: "Isca de frango no molho rosé", extra: false}
    ];

    const accs = ["Arroz Branco", "Feijão Preto", "Feijão Marrom", "Macarrão Alho e Óleo", "Macarronese", "Salada Verde", "Salada de Legumes", "Farofa"];
    const bebs = [
        {n: "Coca-Cola 2L", p: 14.00}, {n: "Pepsi 2L", p: 14.00}, {n: "Guaraná 2L", p: 14.00},
        {n: "Guaraná 1.5L", p: 13.00}, {n: "Coca-Cola 1.5L", p: 12.00}, {n: "Guaraná 1L", p: 12.00},
        {n: "Guaraná 600ml", p: 9.00}, {n: "Suco Natural 500ml", p: 8.00}, {n: "Coca Lata", p: 7.00},
        {n: "Pepsi Lata", p: 7.00}, {n: "Sprite Lata", p: 7.00}, {n: "Fanta Lata", p: 7.00},
        {n: "Guaraviton", p: 7.00}, {n: "H2O", p: 7.00}, {n: "Caçulinha", p: 4.50},
        {n: "Água com Gás", p: 4.00}, {n: "Guaravita", p: 2.50}, {n: "Guaracamp", p: 2.50}, {n: "Água", p: 2.00}
    ];

    document.getElementById('check-acompanhamentos').innerHTML = accs.map(a => `<label class="check-linha">${a} <input type="checkbox" value="${a}"></label>`).join('');
    document.getElementById('lista-bebidas').innerHTML = bebs.map(b => `
        <div class="card-produto" onclick="addBebida('${b.n}', ${b.p})">
            <div class="info-p"><h4>${b.n}</h4><div class="preco-p">R$ ${b.p.toFixed(2).replace('.',',')}</div></div>
            <div class="btn-add">+</div>
        </div>`).join('');

    function renderizarProteinas() {
        document.getElementById('lista-proteinas').innerHTML = listaProteinas.map((p, i) => `
            <div class="item-selecao ${proteinaEscolhida === i ? 'active' : ''}" onclick="selecionarProt(${i})">
                ${p.n} ${p.extra ? '<span class="badge-extra">+R$ 3,00</span>' : ''}
            </div>
        `).join('');
    }

    function abrirCustomizacao(tam, preco) { 
        selecionado = { tam, preco }; 
        proteinaEscolhida = null;
        renderizarProteinas();
        document.getElementById('btn-confirmar').disabled = true;
        document.getElementById('btn-confirmar').style.opacity = '0.5';
        document.getElementById('titulo-modal').innerText = "Marmita " + tam; 
        document.getElementById('modal-montar').style.display = 'block'; 
    }

    function selecionarProt(index) {
        proteinaEscolhida = index;
        renderizarProteinas();
        document.getElementById('btn-confirmar').disabled = false;
        document.getElementById('btn-confirmar').style.opacity = '1';
    }

    function fecharModais() { 
        document.querySelectorAll('.modal, #tela-final').forEach(m => m.style.display = 'none'); 
        document.querySelectorAll('#check-acompanhamentos input').forEach(c => c.checked = false); 
    }

    function confirmarItem() {
        if(proteinaEscolhida === null) return;
        const protObj = listaProteinas[proteinaEscolhida];
        let valorFinal = selecionado.preco;
        let infoCarne = "";
        if(protObj.extra) { valorFinal += 3.00; infoCarne = " (C/ Carne Vermelha)"; }
        let escolhidos = []; 
        document.querySelectorAll('#check-acompanhamentos input:checked').forEach(i => escolhidos.push(i.value));
        carrinho.push({ 
            exibir: "Marmita " + selecionado.tam + infoCarne, 
            valor: valorFinal, 
            obs: `Prot: ${protObj.n} | Acc: ${escolhidos.join(', ')}` 
        });
        atualizarCarrinho(); 
        fecharModais();
    }

    function addBebida(nome, preco) { 
        carrinho.push({ exibir: nome, valor: preco, obs: "Bebida Gelada" }); 
        atualizarCarrinho(); 
    }

    function remover(index) { 
        carrinho.splice(index, 1); 
        if(carrinho.length === 0) fecharModais(); else irParaCheckout(); 
        atualizarCarrinho(); 
    }

    function atualizarCarrinho() {
        const bar = document.getElementById('carrinho-fixo');
        if(carrinho.length > 0) {
            bar.style.display = 'block';
            const total = carrinho.reduce((s, i) => s + i.valor, 0);
            document.getElementById('txt-qtd').innerText = carrinho.length + " item(ns)";
            document.getElementById('txt-total').innerText = "R$ " + total.toFixed(2).replace('.',',');
        } else { bar.style.display = 'none'; }
    }

    function irParaCheckout() {
        document.getElementById('tela-final').style.display = 'block';
        const total = carrinho.reduce((s,i)=>s+i.valor,0);
        document.getElementById('itens-final').innerHTML = carrinho.map((item, index) => `
            <div class="item-resumo">
                <div style="flex:1"><strong style="font-size:0.9rem;">${item.exibir}</strong><br><span style="font-size:0.7rem; color:#636e72;">${item.obs}</span><br><button class="btn-remover" onclick="remover(${index})">✕ Remover</button></div>
                <div style="font-weight:700; font-size:0.9rem;">R$ ${item.valor.toFixed(2).replace('.',',')}</div>
            </div>`).join('') + `<div style="display:flex; justify-content:space-between; margin-top:15px; font-weight:700; color:var(--secundaria);"><span>Total:</span><span>R$ ${total.toFixed(2).replace('.',',')}</span></div>`;
    }

    function finalizarNoZap() {
        const n = document.getElementById('nome-cliente').value; 
        const e = document.getElementById('end-cliente').value; 
        const p = document.getElementById('pgto-cliente').value;
        const h = document.getElementById('horario-entrega').value;
        if(!n || !e) return alert("Preencha Nome e Endereço!");
        let txt = `*PEDIDO ONLINE: TEMPEROS BAIANO*%0A%0A*Cliente:* ${n}%0A*End:* ${e}%0A*Horário:* ${h}%0A*PG:* ${p}%0A----------------------------%0A`;
        carrinho.forEach((i, idx) => { txt += `*${idx+1}. ${i.exibir}* (R$ ${i.valor.toFixed(2).replace('.',',')})%0A_${i.obs}_%0A%0A`; });
        txt += `----------------------------%0A*TOTAL: R$ ${carrinho.reduce((s,i)=>s+i.valor,0).toFixed(2).replace('.',',')}*`;
        window.open(`https://wa.me/5521967714571?text=${txt}`);
    }

    const horaAtual = new Date().getHours(); 
    const st = document.getElementById('status-loja');
    if(horaAtual >= 11 && horaAtual < 15) { st.innerText = "● ABERTO AGORA"; st.className = "status-badge open"; } 
    else { st.innerText = "○ FECHADO - Abre às 11h"; st.className = "status-badge closed"; }
</script>
</body>
</html>
